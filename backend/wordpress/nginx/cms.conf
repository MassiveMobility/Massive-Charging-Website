# Nginx server block for headless WordPress CMS
# Place this file at: /etc/nginx/sites-available/cms.massivecharging.com
# Enable with: ln -s /etc/nginx/sites-available/cms.massivecharging.com /etc/nginx/sites-enabled/
# Then run: sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name cms.massivecharging.com;

    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cms.massivecharging.com;

    # SSL — provisioned by Certbot
    ssl_certificate     /etc/letsencrypt/live/cms.massivecharging.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.massivecharging.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/cms;
    index index.php;

    # Upload size — covers media library uploads
    client_max_body_size 64M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Block sensitive paths ─────────────────────────────────────────────────
    # Disable XML-RPC (not needed for headless)
    location = /xmlrpc.php {
        deny all;
    }

    # Block PHP execution inside uploads directory
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # Block dotfiles (.htaccess, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # ── WordPress permalink rewriting ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        include         fastcgi_params;
        fastcgi_pass    unix:/run/php/php8.2-fpm.sock;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_intercept_errors on;
        fastcgi_read_timeout 60;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires    max;
        log_not_found off;
        access_log off;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cms.massivecharging.com.access.log;
    error_log  /var/log/nginx/cms.massivecharging.com.error.log;
}
